apiVersion: v1
kind: Namespace
metadata:
  name: ddd-house
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ddd-house-config
  namespace: ddd-house
data:
  HTTP_ADDR: ":8080"
  DATABASE_DSN: "/data/ddd.db"
  LOG_ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  LOG_OUTPUT: "stdout"
  OIDC_DEV_MODE: "false"
  OIDC_ISSUER_URL: "http://keycloak.keycloak.svc.cluster.local:8080/realms/master"
  OIDC_CLIENT_ID: "ddd-app"
  OIDC_REDIRECT_URL: "http://ddd-house.zouhang.com/oauth2/callback"
  OIDC_FRONTEND_URL: "http://ddd-house.zouhang.com"
  OIDC_SCOPES: "openid,profile,email,roles"
  OIDC_SESSION_TTL: "24h"
---
apiVersion: v1
kind: Secret
metadata:
  name: ddd-house-secrets
  namespace: ddd-house
type: Opaque
stringData:
  OIDC_CLIENT_SECRET: "oPM62ojKTpqFHbW1oCPJVu2CCQ7TrMu1"
  OIDC_SESSION_SECRET: "9D9YhTWHanAvYkO3l48F9ILCUgazCH36"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ddd-house-data
  namespace: ddd-house
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: hostpath
---
apiVersion: v1
kind: Service
metadata:
  name: ddd-house-backend
  namespace: ddd-house
spec:
  selector:
    app: ddd-house-backend
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddd-house-backend
  namespace: ddd-house
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ddd-house-backend
  template:
    metadata:
      labels:
        app: ddd-house-backend
    spec:
      containers:
      - name: backend
        image: harbor.zouhang.com/library/ddd-house-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: ddd-house-config
        - secretRef:
            name: ddd-house-secrets
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: ddd-house-data
---
apiVersion: v1
kind: Service
metadata:
  name: ddd-house-frontend
  namespace: ddd-house
spec:
  selector:
    app: ddd-house-frontend
  ports:
  - port: 80
    targetPort: 80
    name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddd-house-frontend
  namespace: ddd-house
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ddd-house-frontend
  template:
    metadata:
      labels:
        app: ddd-house-frontend
    spec:
      containers:
      - name: frontend
        image: harbor.zouhang.com/library/ddd-house-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ddd-house
  namespace: ddd-house
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: ddd-house.zouhang.com
    http:
      paths:
      # 后端API路由 - 直接转发，后端已配置/api前缀处理
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ddd-house-backend
            port:
              number: 8080
      # OAuth2路由
      - path: /oauth2
        pathType: Prefix
        backend:
          service:
            name: ddd-house-backend
            port:
              number: 8080
      # 健康检查和监控
      - path: /health
        pathType: Exact
        backend:
          service:
            name: ddd-house-backend
            port:
              number: 8080
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: ddd-house-backend
            port:
              number: 8080
      # 前端路由 - 所有不匹配以上路径的请求都走前端
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ddd-house-frontend
            port:
              number: 80
